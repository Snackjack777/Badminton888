<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Queue Master</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-brand">BADMINTON Q</div>
        <div class="nav-links">
            <button onclick="showView('dashboard')" title="หน้าหลัก"><i class="fas fa-home"></i></button>
            <button onclick="showView('queue')" title="จัดการคิว"><i class="fas fa-users"></i></button>
            <button onclick="showView('courts')" title="สถานะสนาม"><i class="fas fa-table-tennis"></i></button>
            <button onclick="showView('leaderboard')" title="ตารางคะแนน"><i class="fas fa-trophy"></i></button>
        </div>
    </nav>

    <main class="container">
        <section id="dashboard" class="view">
            <div class="card">
                <h2><i class="fas fa-user-plus"></i> เพิ่มผู้เล่นใหม่</h2>
                <div class="input-group">
                    <input type="text" id="playerName" placeholder="พิมพ์ชื่อผู้เล่นที่นี่...">
                    <button onclick="addPlayer()" class="btn-primary">
                        <i class="fas fa-plus"></i> เพิ่ม
                    </button>
                </div>
            </div>
            <div id="playerList" class="player-grid">
                </div>
        </section>

        <section id="queue" class="view" style="display:none;">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-clock"></i> คิวผู้เล่นปัจจุบัน</h2>
                    <span id="queueCount" class="badge">0 คน</span>
                </div>
                <div id="queueList" class="queue-list">
                    <p class="empty-msg">ยังไม่มีผู้เล่นในคิว...</p>
                </div>
                <button onclick="autoMatch()" class="btn-success mt-1" style="width: 100%;">
                    <i class="fas fa-robot"></i> จัดสนามอัตโนมัติ (AI Match)
                </button>
            </div>

            <div class="card mt-2">
                <h2><i class="fas fa-hand-paper"></i> จัดคิวด้วยตนเอง (Manual)</h2>
                <div class="manual-match-container">
                    <div class="player-selection-grid">
                        <div class="team-select">
                            <h3 class="team-a-label">ทีม A</h3>
                            <select id="player1"><option value="">เลือกผู้เล่น 1</option></select>
                            <select id="player2"><option value="">เลือกผู้เล่น 2</option></select>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team-select">
                            <h3 class="team-b-label">ทีม B</h3>
                            <select id="player3"><option value="">เลือกผู้เล่น 3</option></select>
                            <select id="player4"><option value="">เลือกผู้เล่น 4</option></select>
                        </div>
                    </div>
                    
                    <div class="court-select-wrapper mt-1">
                        <label for="targetCourt"><i class="fas fa-map-marker-alt"></i> เลือกสนามที่ต้องการ:</label>
                        <select id="targetCourt">
                            <option value="">-- กรุณาเลือกสนาม --</option>
                        </select>
                    </div>
                    
                    <button onclick="manualMatch()" class="btn-primary mt-1" style="width: 100%;">
                        <i class="fas fa-check-circle"></i> ยืนยันการจัดสนาม
                    </button>
                </div>
            </div>
            <div class="card mt-2">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2><i class="fas fa-calendar-alt"></i> ตารางการแข่งขันล่วงหน้า</h2>
                    <button onclick="generateRoundRobin()" class="btn-success" style="padding: 5px 10px; font-size: 0.8em;">
                        <i class="fas fa-magic"></i> จัดทัวร์นาเมนต์อัตโนมัติ
                    </button>
                </div>
                
                <div id="matchPlanList">
                    </div>
                
                <button onclick="addNewMatchToRound()" class="btn-primary mt-1" style="width: 100%;">
                    <i class="fas fa-plus"></i> เพิ่มคู่แข่งขันเอง
                </button>
            </div>
        </section>

        <section id="courts" class="view" style="display:none;">
            <div class="card mb-1">
                <div class="court-controls">
                    <i class="fas fa-cog"></i>
                    <label for="courtCount">จำนวนสนามทั้งหมด:</label>
                    <input type="number" id="courtCount" value="2" min="1" max="10" onchange="updateCourtCount()">
                </div>
            </div>
            <div id="courtContainer" class="court-grid">
                </div>
        </section>

        <section id="leaderboard" class="view" style="display:none;">
            <div class="card">
                <h2><i class="fas fa-medal"></i> อันดับผู้เล่นยอดเยี่ยม</h2>
                <div class="table-responsive">
                    <table id="leaderboardTable">
                        <thead>
                            <tr>
                                <th>อันดับ</th>
                                <th>ชื่อผู้เล่น</th>
                                <th>Rating</th>
                                <th>ชนะ/แพ้</th>
                                <th>Win Rate</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
